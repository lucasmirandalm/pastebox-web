{{define "content"}}
<section class="mb-8">
  <div class="border-b border-neutral-200 pb-6">
    <p class="mb-2 font-['Sora'] text-xs font-semibold uppercase tracking-[0.18em] text-neutral-500">
      Public paste
    </p>

    <h1 class="font-['Sora'] text-3xl font-semibold tracking-[-0.05em] text-black">
      {{.Paste.Title}}
    </h1>

    <p class="mt-3 text-sm text-neutral-500">
      Last edited · {{.Paste.LastEdited}}
    </p>
  </div>
</section>

<section class="rounded-2xl border border-neutral-200 bg-neutral-50 p-5">
  <pre class="whitespace-pre-wrap break-words font-mono text-sm leading-7 text-neutral-800">{{.Paste.Content}}</pre>
</section>

<div class="mt-6">
  <a href="/pastes" class="text-sm font-medium text-neutral-500 hover:text-black">
    Back to Pastebox
  </a>
</div>
{{end}}
