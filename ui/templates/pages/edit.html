{{define "content"}}
<section class="mb-8">
  <div class="border-b border-neutral-200 pb-6">
    <p class="mb-2 font-['Sora'] text-xs font-semibold uppercase tracking-[0.18em] text-neutral-500">
      Edit paste
    </p>

    <h1 class="font-['Sora'] text-3xl font-semibold tracking-[-0.05em] text-black">
      Edit paste
    </h1>
  </div>
</section>

<section class="mb-6 rounded-2xl border border-neutral-200 bg-neutral-50 p-4">
  <p class="text-xs font-medium uppercase tracking-[0.16em] text-neutral-500">
    Public link
  </p>

  <p class="mt-2 break-all font-mono text-sm text-black">
    /p/{{.PublicID}}
  </p>
</section>

<form action="/pastes/{{.ID}}" method="post" class="space-y-5">
  <div>
    <label for="title" class="mb-2 block text-sm font-medium text-neutral-700">
      Title
    </label>

    <input
      id="title"
      name="title"
      type="text"
      value="{{.Title}}"
      class="h-11 w-full rounded-xl border border-neutral-300 bg-white px-4 text-sm outline-none placeholder:text-neutral-400 focus:border-black"
    >
  </div>

  <div>
    <label for="content" class="mb-2 block text-sm font-medium text-neutral-700">
      Content
    </label>

    <textarea
      id="content"
      name="content"
      rows="16"
      class="w-full resize-y rounded-xl border border-neutral-300 bg-white px-4 py-3 font-mono text-sm leading-6 outline-none placeholder:text-neutral-400 focus:border-black"
    >{{.Content}}</textarea>
  </div>

  <label
    for="is_favorite"
    class="flex cursor-pointer items-center justify-between gap-4 rounded-2xl border border-neutral-200 bg-neutral-50 px-4 py-4 transition hover:border-black"
  >
    <input
      id="is_favorite"
      name="is_favorite"
      type="checkbox"
      {{if .IsFavorite}}checked{{end}}
      class="peer sr-only"
    >

    <span class="flex items-center gap-3">
      <span class="flex h-9 w-9 items-center justify-center rounded-full border border-neutral-300 bg-white font-['Sora'] text-sm text-black">
        ★
      </span>

      <span>
        <span class="block text-sm font-semibold text-black">
          Favorite
        </span>

        <span class="block text-xs text-neutral-500">
          Keep this paste highlighted in your library.
        </span>
      </span>
    </span>

    <span
      class="relative h-7 w-12 rounded-full border border-neutral-300 bg-white transition after:absolute after:left-1 after:top-1 after:h-5 after:w-5 after:rounded-full after:bg-neutral-300 after:transition after:content-[''] peer-checked:border-black peer-checked:bg-black peer-checked:after:translate-x-5 peer-checked:after:bg-white peer-focus-visible:ring-2 peer-focus-visible:ring-black peer-focus-visible:ring-offset-2"
    ></span>
  </label>

  <div class="flex items-center justify-between border-t border-neutral-200 pt-5">
    <a href="/pastes" class="text-sm font-medium text-neutral-500 hover:text-black">
      Cancel
    </a>

    <button
      type="submit"
      class="rounded-full bg-black px-5 py-3 text-sm font-semibold text-white hover:bg-neutral-800"
    >
      Save changes
    </button>
  </div>
</form>
{{end}}
