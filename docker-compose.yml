services:
  postgres:
    image: postgres:16
    container_name: pastebox_web_postgres
    environment:
      POSTGRES_USER: pastebox_user
      POSTGRES_PASSWORD: pastebox_password
      POSTGRES_DB: pastebox_web
    ports:
      - "5435:5432"
    volumes:
      - pastebox_web_postgres_data:/var/lib/postgresql/data

volumes:
  pastebox_web_postgres_data: